<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同步翻譯影片播放器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂滾動條樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* 隱藏預設影片外框 */
        video:focus {
            outline: none;
        }
        
        /* 啟動狀態的平滑過渡 */
        .subtitle-item {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-900 h-screen w-screen overflow-hidden flex flex-col font-sans text-slate-800">

    <!-- 頂部標題列 -->
    <header class="bg-slate-800 text-white p-4 shadow-md z-10 flex-shrink-0">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-subtitles"><path d="M7 13h4"/><path d="M15 13h2"/><path d="M7 9h2"/><path d="M13 9h4"/><path d="M21 15a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
            雙語同步翻譯播放器 - The Strange Day
        </h1>
    </header>

    <!-- 主要內容區 -->
    <main class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- 左側：影片播放區 -->
        <section class="w-full md:w-1/2 bg-black flex flex-col justify-center items-center relative shadow-inner flex-shrink-0 md:flex-shrink">
            <div class="w-full max-w-3xl px-4 py-6">
                <video 
                    id="mainVideo" 
                    class="w-full rounded-lg shadow-2xl bg-slate-900 border border-slate-700" 
                    controls 
                    playsinline>
                    <!-- 已將檔名更新為 the-strange-day-speech.mp4 -->
                    <source src="the-strange-day-speech.mp4" type="video/mp4">
                    您的瀏覽器不支援影片標籤。
                </video>
            </div>
            <!-- 影片控制提示 -->
            <div class="absolute bottom-4 left-0 w-full text-center text-slate-400 text-sm opacity-70">
                點擊右側字幕可快速跳轉播放位置
            </div>
        </section>

        <!-- 右側：字幕滾動區 -->
        <section class="w-full md:w-1/2 bg-white flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.1)] flex-1 overflow-hidden z-0">
            <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center shadow-sm">
                <h2 class="font-semibold text-slate-700">中英雙語字幕</h2>
                <div class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded-full font-medium">
                    自動同步中
                </div>
            </div>
            
            <div id="transcriptContainer" class="flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50 relative pb-32">
                <!-- 字幕將透過 JavaScript 動態生成 -->
            </div>
        </section>

    </main>

    <script>
        // 字幕資料庫：包含開始時間(秒)、結束時間(秒)、英文、繁體中文
        const subtitles = [
            { start: 0, end: 11, en: "I saw these weird-looking posters and the posters read 'Grandpa eats toilet shoes'.", zh: "我看到這些長得很奇怪的海報，海報上寫著『爺爺吃馬桶鞋』。" },
            { start: 12, end: 14, en: "Hello Timmy, welcome to show.", zh: "『你好，Timmy，歡迎來到節目。』" },
            { start: 14, end: 18, en: "We had a bad chat and it was basically bad.", zh: "我們聊得很糟糕，基本上就是很爛。" },
            { start: 18, end: 24, en: "My name is not Timmy, I said. Did you know that my uncle is married to a pair of slippers? Said my uncle.", zh: "『我不叫Timmy，』我說。『你知道我叔叔跟一雙拖鞋結婚了嗎？』我叔叔說。" },
            { start: 24, end: 32, en: "Stop with this nonsense, I said. I was scratching my bum, eating my nails, and eating a tiny little pizza that was moldy and rotten.", zh: "『別胡扯了，』我說。我正在抓屁股、咬指甲，還吃著一塊發霉腐爛的小披薩。" },
            { start: 32, end: 36, en: "I then ate a chair, a broken chair.", zh: "然後我吃了一張椅子，一張壞掉的椅子。" },
            { start: 36, end: 43, en: "And all of a sudden, the guy started yelling like a crazy monkey, so I threw Michael Jackson at the stage. Hee hee!", zh: "突然間，那個人像瘋猴子一樣大叫，所以我把麥可·傑克森扔上了舞台。嘻嘻！" },
            { start: 43, end: 54, en: "Then my buddy Tom came out wearing a banana peel and holding a baseball bat that says 'I love chicken chairs'.", zh: "然後我的好哥們 Tom 穿著香蕉皮出來了，手裡拿著一根棒球棍，上面寫著『我愛雞肉椅』。" },
            { start: 54, end: 59, en: "Then a lady was taking off clothes and she said 'We're not ladies, you silly biscuit head.' I said.", zh: "然後一位女士在脫衣服，她說『我們不是女士，你這愚蠢的餅乾頭。』我說。" },
            { start: 59, end: 65, en: "I then yelled out 'Get the baseball bats!'", zh: "然後我大喊『拿棒球棍來！』" },
            { start: 65, end: 70, en: "Then a waiter came out wearing roller skates and turning into a goose.", zh: "然後一個服務生穿著溜冰鞋出來，變成了一隻鵝。" },
            { start: 70, end: 75, en: "It's a goose that shoots peas, I said. I then shot it out my mouth. Pew!", zh: "『這是一隻會射豌豆的鵝，』我說。然後我從嘴裡射出來。砰！" },
            { start: 75, end: 79, en: "And he instantly turned into a goose. Honk.", zh: "他瞬間變成了一隻鵝。嘎。" },
            { start: 79, end: 84, en: "Well that's not what I expected, my cat Tom said.", zh: "『嗯，這可不是我預料中的，』我的貓 Tom 說。" },
            { start: 84, end: 95, en: "Then I went to a steak joint and saw a fashion: steak, frog, rat, and scallops. Wear it! Buy one get one free.", zh: "然後我去了一家牛排館，看到一種時尚：牛排、青蛙、老鼠和干貝。穿上它！買一送一。" },
            { start: 95, end: 107, en: "Well that's strange, I said. So we went inside. And we saw this. It was a gym that had every food, and every treadmill, dumbbell, and even a lot of exercise equipment.", zh: "『嗯，這真奇怪，』我說。所以我們進去了。我們看到了這個。那是一個健身房，裡面有各種食物，還有各種跑步機、啞鈴，甚至很多運動器材。" },
            { start: 107, end: 112, en: "We then went out and saw a man with chicken legs for limbs.", zh: "然後我們出去，看到一個四肢是雞腿的男人。" },
            { start: 112, end: 118, en: "He then said 'Eww eww eww eww ahh pee pee eye eye eye.'", zh: "然後他說『Eww eww eww eww ahh pee pee eye eye eye.』" },
            { start: 118, end: 122, en: "I then screamed the terrible scream. Ahhhhh!", zh: "然後我發出了可怕的尖叫。啊！" },
            { start: 122, end: 127, en: "It's my lovely brother Brian! That's right, said my wife, disguised as a man.", zh: "『是我可愛的弟弟 Brian！』『沒錯，』我那偽裝成男人的妻子說。" },
            { start: 127, end: 133, en: "She took off her silicon mask and threw up.", zh: "她摘下矽膠面具然後吐了。" },
            { start: 133, end: 143, en: "When we got inside my wife's mouth, it smelled really bad. Really really really really really really really really really really really bad!", zh: "當我們進到我妻子的嘴裡時，裡面聞起來很糟。非常非常非常非常非常非常非常非常非常非常非常糟！" },
            { start: 143, end: 147, en: "I started to vomit. Blergh.", zh: "我開始嘔吐。嘔。" },
            { start: 147, end: 151, en: "But we found a portal in the mouth and went inside. We saw a huge gigantic chicken chair.", zh: "但我們在嘴裡發現了一個傳送門，就進去了。我們看到了一張巨大的雞肉椅。" },
            { start: 151, end: 154, en: "Brother Brian! I yelled.", zh: "『弟弟 Brian！』我大叫。" },
            { start: 154, end: 161, en: "I then untied my brother, and we came outside the portal. We then smashed open the T-Rex, and there was our 30 ants.", zh: "然後我幫我弟弟鬆綁，我們走出了傳送門。然後我們砸開了霸王龍，裡面有我們的 30 隻螞蟻。" },
            { start: 161, end: 164, en: "The code is like 2469 or whatever, you get to open it up.", zh: "『密碼大概是 2469 之類的，你就能打開它。』" },
            { start: 164, end: 168, en: "But it took us one day to open it up for us.", zh: "但我們花了一天的時間才打開。" },
            { start: 168, end: 172, en: "We then told the royal wife to stop this nonsense.", zh: "然後我們叫皇家妻子停止這場鬧劇。" },
            { start: 172, end: 178, en: "The wife surrendered and said 'We need peace!'", zh: "妻子投降了，說『我們需要豌豆（peas）！』" },
            { start: 178, end: 180, en: "You mean peace, right? I said.", zh: "『妳是說和平（peace）吧？』我說。" },
            { start: 180, end: 184, en: "We then went back home and danced the conga. And we ate tacos for lunch.", zh: "然後我們回家跳了康加舞。午餐吃了塔可餅。" },
            { start: 184, end: 195, en: "The end of this chapter. Urgh!", zh: "本章結束。呃！" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('mainVideo');
            const container = document.getElementById('transcriptContainer');
            let activeIndex = -1;

            // 將秒數轉換為 mm:ss 格式
            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // 渲染字幕列表
            subtitles.forEach((sub, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'subtitle-item mb-4 p-4 rounded-xl border-l-4 border-transparent cursor-pointer hover:bg-slate-100 group transition-all duration-300 origin-left';
                itemDiv.id = `sub-${index}`;
                
                // 點擊字幕跳轉影片
                itemDiv.addEventListener('click', () => {
                    video.currentTime = sub.start;
                    video.play();
                });

                itemDiv.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="text-xs font-mono text-slate-400 mt-1 flex-shrink-0 group-hover:text-blue-500 transition-colors">
                            ${formatTime(sub.start)}
                        </div>
                        <div class="flex-1">
                            <p class="text-lg text-slate-800 font-medium mb-1 en-text leading-snug">${sub.en}</p>
                            <p class="text-md text-slate-600 zh-text">${sub.zh}</p>
                        </div>
                    </div>
                `;
                container.appendChild(itemDiv);
            });

            // 監聽影片播放進度，更新字幕高亮狀態
            video.addEventListener('timeupdate', () => {
                const currentTime = video.currentTime;
                
                // 尋找目前時間對應的字幕
                const newActiveIndex = subtitles.findIndex(
                    sub => currentTime >= sub.start && currentTime < sub.end
                );

                if (newActiveIndex !== activeIndex) {
                    // 移除舊的高亮
                    if (activeIndex !== -1) {
                        const oldEl = document.getElementById(`sub-${activeIndex}`);
                        if (oldEl) {
                            oldEl.classList.remove('bg-blue-50', 'border-l-blue-500', 'shadow-md', 'scale-[1.02]');
                            oldEl.classList.add('border-transparent');
                            oldEl.querySelector('.en-text').classList.remove('text-blue-900', 'font-bold');
                            oldEl.querySelector('.zh-text').classList.remove('text-blue-700', 'font-bold');
                        }
                    }

                    // 添加新的高亮
                    if (newActiveIndex !== -1) {
                        const newEl = document.getElementById(`sub-${newActiveIndex}`);
                        if (newEl) {
                            newEl.classList.add('bg-blue-50', 'border-l-blue-500', 'shadow-md', 'scale-[1.02]');
                            newEl.classList.remove('border-transparent');
                            newEl.querySelector('.en-text').classList.add('text-blue-900', 'font-bold');
                            newEl.querySelector('.zh-text').classList.add('text-blue-700', 'font-bold');
                            
                            // 自動滾動到可視範圍，讓字幕保持在中間
                            newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }

                    activeIndex = newActiveIndex;
                }
            });
        });
    </script>
</body>
</html>
